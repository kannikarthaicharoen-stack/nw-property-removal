<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Property Removal | NatureWorks NBC</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{
  --teal:#00B5A8; --teal-dark:#00958A; --navy:#1F497D; --navy-dark:#163A63; --gold:#C5940A;
  --bg:#F4F6F8; --card:#FFFFFF; --border:#E3E8EE; --text:#1F2937; --muted:#6B7280;
  --danger:#D64545; --warn:#E2A400; --success:#2E8B57; --info:#2F6FED;
  --radius:10px; --shadow:0 1px 3px rgba(16,24,40,.08), 0 1px 2px rgba(16,24,40,.06);
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',"TH Sarabun New",Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
.hidden{display:none !important;}
a{color:var(--teal-dark);}

/* ---------- Login ---------- */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy) 0%,var(--teal) 100%);padding:20px;}
.loginCard{background:var(--card);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.25);padding:36px 32px;width:100%;max-width:400px;}
.loginCard h1{font-size:20px;margin:0 0 2px;color:var(--navy);}
.loginCard .sub{color:var(--muted);font-size:13px;margin-bottom:22px;}
.loginLogo{display:flex;align-items:center;gap:8px;margin-bottom:18px;}
.loginLogo .dot{width:26px;height:26px;border-radius:50%;background:conic-gradient(var(--teal),var(--navy),var(--gold),var(--teal));}
.loginLogo span{font-weight:700;color:var(--navy);font-size:17px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:#fafbfc;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal);background:#fff;}
.btnPrimary{background:var(--navy);color:#fff;border:none;padding:11px 18px;border-radius:8px;font-size:14.5px;font-weight:600;width:100%;transition:.15s;}
.btnPrimary:hover{background:var(--navy-dark);}
.btnPrimary:disabled{opacity:.5;cursor:not-allowed;}
.linkBtn{background:none;border:none;color:var(--teal-dark);font-size:13px;padding:0;text-decoration:underline;}
.authMsg{font-size:13px;padding:9px 12px;border-radius:8px;margin-bottom:14px;}
.authMsg.err{background:#FDECEC;color:var(--danger);}
.authMsg.ok{background:#E9F7EF;color:var(--success);}

/* ---------- App shell ---------- */
#appShell{display:none;min-height:100vh;flex-direction:column;}
header.topbar{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand .dot{width:30px;height:30px;border-radius:50%;background:conic-gradient(var(--teal),var(--navy),var(--gold),var(--teal));flex-shrink:0;}
.brand-text h1{font-size:15px;margin:0;color:var(--navy);font-weight:700;}
.brand-text .th{font-size:12px;color:var(--muted);}
.logoStack{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;}
.versionBadge{background:#DCF7E3;color:#1E7A3D;font-size:9.5px;font-weight:700;padding:1px 7px;border-radius:10px;border:1px solid #B7EBC6;white-space:nowrap;}
.userbox{text-align:right;font-size:12.5px;}
.userbox .name{font-weight:600;color:var(--text);}
.userbox .role{color:var(--muted);font-size:11.5px;}
.userbox button{background:none;border:none;color:var(--danger);font-size:12px;cursor:pointer;padding:2px 0;}
.userbox .changePwBtn{color:var(--teal-dark);margin-right:10px;}

nav.tabs{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px;overflow-x:auto;}
nav.tabs button{background:none;border:none;padding:13px 14px;font-size:13.5px;color:var(--muted);border-bottom:2.5px solid transparent;white-space:nowrap;font-weight:500;}
nav.tabs button.active{color:var(--navy);border-color:var(--teal);font-weight:700;}
nav.tabs button:hover{color:var(--navy);}

main{flex:1;padding:20px 24px 60px;max-width:1080px;width:100%;margin:0 auto;}

/* ---------- Subtabs / filters ---------- */
.subtabs{display:flex;gap:8px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:6px;margin-bottom:14px;flex-wrap:wrap;}
.subtabs button{background:none;border:none;padding:8px 14px;border-radius:7px;font-size:13px;color:var(--muted);font-weight:500;}
.subtabs button.active{background:var(--navy);color:#fff;}
.searchRow{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.searchRow input[type=text]{flex:1;min-width:200px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:13.5px;}
.searchRow select{padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:13.5px;}
.btnNew{background:var(--navy);color:#fff;border:none;padding:10px 16px;border-radius:8px;font-size:13.5px;font-weight:600;white-space:nowrap;}
.btnNew:hover{background:var(--navy-dark);}

/* ---------- Cards ---------- */
.passCard{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;}
.passCard:hover{border-color:var(--teal);}
.passCard .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.passCard .passNo{font-weight:700;font-size:14.5px;color:var(--navy);}
.passCard .who{font-size:13px;color:var(--text);margin-top:3px;}
.passCard .meta{font-size:12px;color:var(--muted);margin-top:5px;}
.badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap;}
.badge.pending_l1{background:#FFF3D6;color:#8A6100;}
.badge.pending_l2{background:#FFE9D6;color:#A34E00;}
.badge.approved{background:#DCEEFB;color:#155A9C;}
.badge.issued{background:#1F497D;color:#fff;}
.badge.return_pending_requester{background:#FDEEDC;color:#92400E;}
.badge.return_pending_security{background:#EDE7FC;color:#5B3DBB;}
.badge.return_pending_l1{background:#E0F2FE;color:#075985;}
.badge.return_pending_ehs{background:#DCFCE7;color:#166534;}
.badge.ext-badge{background:#EDE7FC;color:#5B3DBB;}
.badge.returned{background:#DFF3E6;color:#1E6B3E;}
.badge.rejected{background:#FBE0E0;color:#A32020;}
.badge.overdue{background:#FBE0E0;color:#A32020;}
.emptyState{text-align:center;color:var(--muted);padding:60px 20px;font-size:13.5px;}

/* ---------- Form ---------- */
.formCard{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
.formCard h3{margin:0 0 16px;font-size:14.5px;color:var(--navy);border-bottom:1px solid var(--border);padding-bottom:10px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:600px){.grid2{grid-template-columns:1fr;}}
.readonlyBox{padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#F5F7FA;font-size:13.5px;color:var(--muted);}
.itemBlock{border:1px solid var(--border);border-radius:9px;padding:14px;margin-bottom:12px;background:#FAFBFC;position:relative;}
.itemBlock .itemTitle{font-size:12.5px;font-weight:700;color:var(--navy);margin-bottom:10px;}
.itemBlock .removeItem{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--danger);font-size:12px;}
.photoUpload{border:2px dashed var(--border);border-radius:8px;padding:14px;text-align:center;cursor:pointer;background:#fff;}
.photoUpload:hover{border-color:var(--teal);}
.photoUpload img{max-width:100%;max-height:140px;border-radius:6px;}
.photoUpload .icon{font-size:22px;}
.photoUpload .lbl{font-size:11.5px;color:var(--muted);margin-top:4px;}
.addItemBtn{background:#fff;border:1px solid var(--teal);color:var(--teal-dark);padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;}
.formActions{display:flex;gap:10px;margin-top:6px;}
.btnGhost{background:#fff;border:1px solid var(--border);color:var(--muted);padding:10px 18px;border-radius:8px;font-size:13.5px;font-weight:600;}
.btnDanger{background:var(--danger);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:13.5px;font-weight:600;}
.btnSuccess{background:var(--success);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:13.5px;font-weight:600;}

/* ---------- Modal ---------- */
.modalOverlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
.modalBox{background:#fff;border-radius:14px;max-width:640px;width:100%;max-height:88vh;overflow-y:auto;padding:24px;}
.modalBox h2{margin:0 0 4px;font-size:17px;color:var(--navy);}
.modalClose{position:absolute;}
.modalHead{display:flex;justify-content:space-between;align-items:flex-start;}
.modalHead button{background:none;border:none;font-size:20px;color:var(--muted);}
.detailSection{margin-top:16px;padding-top:14px;border-top:1px solid var(--border);}
.detailSection h4{font-size:12.5px;color:var(--navy);margin:0 0 8px;text-transform:uppercase;letter-spacing:.03em;}
.kv{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--text);}
.kv .k{color:var(--muted);}
.itemRowView{display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.itemRowView img{width:56px;height:56px;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid var(--border);}
.itemRowView .info{flex:1;font-size:13px;}
.itemRowView .info .n{font-weight:600;}
.itemRowView .info .m{color:var(--muted);font-size:12px;}

/* Lightbox */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column;padding:20px;}
#lightbox img{max-width:92vw;max-height:78vh;border-radius:6px;}
#lightbox .lbBar{margin-top:14px;display:flex;gap:14px;}
#lightbox .lbBar a,#lightbox .lbBar button{background:#fff;color:var(--navy);border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;}

/* ---------- Dashboard ---------- */
.statGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
@media(max-width:650px){.statGrid{grid-template-columns:repeat(2,1fr);}}
.statCard{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow);}
.statCard .num{font-size:26px;font-weight:700;color:var(--navy);}
.statCard .lbl{font-size:12px;color:var(--muted);margin-top:2px;}
.statCard.warn .num{color:var(--warn);}
.statCard.danger .num{color:var(--danger);}
.dashRow{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:700px){.dashRow{grid-template-columns:1fr;}}
.barRow{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:12.5px;}
.barRow .lbl{width:80px;color:var(--muted);flex-shrink:0;}
.barTrack{flex:1;background:#EEF1F4;border-radius:20px;height:9px;overflow:hidden;}
.barFill{height:100%;border-radius:20px;background:var(--teal);}
.barNum{width:24px;text-align:right;color:var(--text);font-weight:600;}

/* ---------- Tracking ---------- */
.trackStats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}

/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:8px;font-size:13.5px;box-shadow:0 6px 20px rgba(0,0,0,.2);z-index:300;display:none;}
#toast.err{background:var(--danger);}
#toast.ok{background:var(--success);}

.loadingSpin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.pageLoader{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);font-size:13px;}
</style>
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div id="loginScreen">
  <div class="loginCard">
    <div class="loginLogo"><div class="dot"></div><span>NatureWorks</span></div>
    <h1 id="authTitle">เข้าสู่ระบบ</h1>
    <div class="sub">Plant Property Removal / ระบบใบนำของออก</div>
    <div id="authMsg" class="authMsg hidden"></div>

    <div id="loginForm">
      <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="name@natureworkspla.com"></div>
      <div class="field"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
      <button class="btnPrimary" id="btnLogin" onclick="doLogin()">เข้าสู่ระบบ</button>
      <div style="text-align:center;margin-top:14px;display:flex;justify-content:center;gap:16px;">
        <button class="linkBtn" onclick="toggleAuthMode('signup')">ยังไม่มีบัญชี? สมัครใช้งาน</button>
        <button class="linkBtn" onclick="toggleAuthMode('forgot')">ลืมรหัสผ่าน?</button>
      </div>
    </div>

    <div id="signupForm" class="hidden">
      <div class="field"><label>ชื่อ-นามสกุล</label><input type="text" id="suName" placeholder="ชื่อ นามสกุล"></div>
      <div class="field"><label>Email บริษัท</label><input type="email" id="suEmail" placeholder="name@natureworkspla.com"></div>
      <div class="field"><label>Password (อย่างน้อย 6 ตัวอักษร)</label><input type="password" id="suPassword" placeholder="••••••••"></div>
      <button class="btnPrimary" id="btnSignup" onclick="doSignup()">สมัครใช้งาน</button>
      <div style="text-align:center;margin-top:14px;">
        <button class="linkBtn" onclick="toggleAuthMode('login')">มีบัญชีแล้ว? เข้าสู่ระบบ</button>
      </div>
    </div>

    <div id="forgotForm" class="hidden">
      <div class="sub" style="margin:-6px 0 16px;">กรอก Email ที่ใช้สมัครไว้ ระบบจะส่งลิงก์สำหรับตั้งรหัสผ่านใหม่ไปให้ทาง Email</div>
      <div class="field"><label>Email</label><input type="email" id="forgotEmail" placeholder="name@natureworkspla.com"></div>
      <button class="btnPrimary" id="btnForgot" onclick="doForgotPassword()">ส่งลิงก์ตั้งรหัสผ่านใหม่</button>
      <div style="text-align:center;margin-top:14px;">
        <button class="linkBtn" onclick="toggleAuthMode('login')">กลับไปหน้าเข้าสู่ระบบ</button>
      </div>
    </div>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="appShell">
  <header class="topbar">
    <div class="brand">
      <div class="logoStack">
        <div class="dot"></div>
        <div class="versionBadge">v2.1</div>
      </div>
      <div class="brand-text">
        <h1>Plant Property Removal</h1>
        <div class="th">ระบบใบนำของออก</div>
      </div>
    </div>
    <div class="userbox">
      <div class="name" id="ubName">-</div>
      <div class="role" id="ubRole">-</div>
      <button class="changePwBtn" onclick="openChangePasswordModal()">เปลี่ยนรหัสผ่าน</button>
      <button onclick="doLogout()">ออกจากระบบ</button>
    </div>
  </header>

  <nav class="tabs" id="mainTabs">
    <button data-tab="passes" onclick="switchTab('passes')">📋 Removal Passes / ใบนำของออก</button>
    <button data-tab="newrequest" onclick="switchTab('newrequest')">➕ New Request / สร้างคำขอ</button>
    <button data-tab="tracking" onclick="switchTab('tracking')">🔄 Tracking / ติดตาม</button>
    <button data-tab="dashboard" onclick="switchTab('dashboard')">📊 Dashboard / แดชบอร์ด</button>
    <button data-tab="admin" onclick="switchTab('admin')" id="adminTabBtn" style="display:none;">⚙️ Admin / ตั้งค่า</button>
  </nav>

  <main>
    <div id="view-passes"></div>
    <div id="view-newrequest" class="hidden"></div>
    <div id="view-tracking" class="hidden"></div>
    <div id="view-dashboard" class="hidden"></div>
    <div id="view-admin" class="hidden"></div>
  </main>
</div>

<div id="modalRoot"></div>
<div id="lightbox" onclick="if(event.target.id==='lightbox')closeLightbox()">
  <img id="lbImg" src="">
  <div class="lbBar">
    <a id="lbDownload" href="#" download target="_blank">⬇ Download</a>
    <button onclick="closeLightbox()">ปิด / Close</button>
  </div>
</div>
<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
